<!DOCTYPE html>
<html class="light" lang="en">
<head>

    <link href="https://fonts.googleapis.com" rel="preconnect"/>

                        "on-error": "#ffffff",

                        "on-tertiary-fixed": "#341100",
                        "secondary-container": "#9b98ff",
                        error: "#ba1a1a",

                        "surface-tint": "#bf0611",

                        "on-tertiary": "#ffffff",

    <style>
      .bg-fixed-image {
        background-image: url('assets/hero_silk_bg.png') !important;
        background-size: cover !important;
        background-position: center !important;
        background-attachment: fixed !important;
      }
      .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
      .nav-pill { font-family:'Space Grotesk',sans-serif; font-size:14px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; padding:8px 20px; border-radius:999px; border:1.5px solid rgba(28,27,27,0.12); box-shadow:0 2px 8px rgba(0,0,0,0.07); transition:all 0.25s ease; color:#3a3a3a; background:rgba(255,255,255,0.7); text-decoration:none; display:inline-block; }
      .nav-pill:hover { background:#fff; box-shadow:0 4px 16px rgba(0,0,0,0.13); transform:translateY(-2px); color:#8e0008; border-color:rgba(142,0,8,0.25); }
      .nav-pill.active { background:#8e0008; color:#fff; border-color:#8e0008; box-shadow:0 4px 16px rgba(142,0,8,0.25); }
      .amarante-regular { font-family: "Amarante", serif; font-weight: 400; font-style: normal; }
      .yatra-one-regular { font-family: "Yatra One", system-ui; font-weight: 400; font-style: normal; text-transform: none !important; }
    </style>
    <style type="text/tailwindcss">
        @layer utilities {
            .display-lg { @apply font-headline text-5xl md:text-7xl font-bold leading-none tracking-tighter; }
            .headline-lg { @apply font-headline text-3xl md:text-5xl font-bold leading-tight tracking-tight; }
            .title-lg { @apply font-body text-xl md:text-2xl font-semibold leading-relaxed text-on-surface; }
            .body-md { @apply font-body text-base font-normal leading-relaxed text-on-surface-variant; }
            .label-md { @apply font-label text-sm uppercase tracking-widest font-medium text-on-surface-variant; }
            .label-sm { @apply font-label text-xs uppercase tracking-widest font-medium text-on-surface-variant; }
        }
    </style>

</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body bg-fixed-image pt-24">
<!-- TopNavBar -->
  <nav class="bg-stone-100/90 backdrop-blur-md fixed top-0 left-0 right-0 z-50 w-full border-b border-stone-200 shadow-sm" style="z-index: 50;">
    <div class="relative flex items-center w-full px-8 py-4 max-w-[1920px] mx-auto">
      <a class="text-2xl tracking-tighter text-stone-950 flex-shrink-0 flex items-center gap-1 transition-all duration-300 hover:-translate-y-1 hover:drop-shadow-[0_4px_8px_rgba(142,0,8,0.25)]"
        href="index.html"><span class="amarante-regular font-bold">Mano</span><span
          class="yatra-one-regular text-primary">ध्वनि </span></a>
      <div class="hidden md:flex absolute left-1/2 -translate-x-1/2 gap-3">
        <a class="nav-pill" id="nav-home-link" href="index.html">HOME</a>
        <a class="nav-pill active" id="nav-analysis-link" href="analysis.html">Analysis</a>
        <a class="nav-pill" id="nav-results-link" href="results.html">Result</a>
      </div>
      <div class="flex items-center gap-4 ml-auto">
        <div id="user-badge" class="hidden items-center gap-3 cursor-pointer" onclick="window.location.href='profile.html'">
          <img id="user-avatar" src="" alt="" class="w-9 h-9 rounded-full border-2 border-primary object-cover" referrerpolicy="no-referrer" onerror="this.src='https://ui-avatars.com/api/?background=bb000e&color=fff&size=64'">
          <span id="user-name" class="font-label text-xs uppercase tracking-widest text-on-surface hidden md:block"></span>
        </div>
        <div id="auth-section">
          <a id="login-signup-btn" href="login.html" class="star-border rounded-sm transition-all duration-300 hover:-translate-y-[2px]">
            <div class="star-border-inner bg-primary text-on-primary font-label text-sm uppercase tracking-wider px-6 py-3 rounded-sm">
              Signup/Login
            </div>
          </a>
        </div>
      </div>
    </div>
  </nav>

<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-start w-full max-w-[1440px] mx-auto px-4 md:px-8 py-12 md:py-24">
    <div class="w-full max-w-4xl mb-16 flex flex-col items-start relative pl-12 md:pl-24">
        <span class="absolute top-0 left-0 label-sm text-outline">01</span>
        <h1 class="display-lg text-on-surface mb-6">User Info</h1>
    </div>

    <!-- Main Form Card -->
    <div class="w-full max-w-2xl bg-stone-50/95 backdrop-blur-md relative p-8 md:p-12 z-10 shadow-[0_24px_48px_-12px_rgba(28,27,27,0.12)] rounded-2xl border border-white/20">
        <div class="flex flex-col md:flex-row gap-12 items-start">
            <!-- Profile Photo Area -->
            <div class="flex flex-col items-center gap-4 flex-shrink-0">
                <div class="relative group cursor-pointer">
                    <div class="w-32 h-32 rounded-full bg-surface-container overflow-hidden relative">
                        <img id="profile-img" alt="Subject Placeholder" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity" src="https://ui-avatars.com/api/?background=8e0008&color=fff&name=MD"/>
                        <div class="absolute inset-0 bg-on-surface/10 group-hover:bg-on-surface/0 transition-colors"></div>
                    </div>
                    <div class="absolute bottom-1 right-1 w-5 h-5 bg-surface-container-lowest rounded-full flex items-center justify-center">
                        <div class="w-3 h-3 bg-[#4ade80] rounded-full"></div>
                    </div>
                </div>
                <span class="label-sm hover:text-primary cursor-pointer transition-colors">Profile Ready</span>
            </div>

            <!-- Form Fields -->
            <div class="w-full flex flex-col gap-8 flex-grow pt-2">
                <div class="flex flex-col gap-2">
                    <label class="label-sm" for="fullName">Full Name</label>
                    <div class="relative bg-surface-container-low px-4 py-3 flex items-center gap-3">
                        <span class="material-symbols-outlined text-on-surface-variant">person</span>
                        <input class="bg-transparent border-none p-0 w-full text-on-surface focus:ring-0 body-md placeholder:text-outline/50" id="fullName" placeholder="Enter subject name" type="text"/>
                    </div>
                </div>
                <div class="flex flex-col md:flex-row gap-8">
                    <div class="flex flex-col gap-2 w-full md:w-1/2">
                        <label class="label-sm" for="age">Age</label>
                        <div class="relative bg-surface-container-low px-4 py-3 flex items-center gap-3">
                            <span class="material-symbols-outlined text-on-surface-variant">calendar_today</span>
                            <input class="bg-transparent border-none p-0 w-full text-on-surface focus:ring-0 body-md placeholder:text-outline/50" id="age" placeholder="Years" type="number"/>
                        </div>
                    </div>
                    <div class="flex flex-col gap-2 w-full md:w-1/2">
                        <label class="label-sm" for="gender">Gender</label>
                        <div class="relative bg-surface-container-low px-4 py-3 flex items-center gap-3">
                            <span class="material-symbols-outlined text-on-surface-variant">wc</span>
                            <select class="bg-transparent border-none p-0 w-full text-on-surface focus:ring-0 body-md appearance-none" id="gender">
                                <option disabled selected value="">Select</option>
                                <option value="Female">Female</option>
                                <option value="Male">Male</option>
                                <option value="Other">Other</option>
                                <option value="Prefer not to say">Prefer not to say</option>
                            </select>
                            <span class="material-symbols-outlined absolute right-4 pointer-events-none text-on-surface-variant">expand_more</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="mt-16 flex items-center justify-end gap-6 pt-8 bg-transparent border-t border-stone-200/50">
            <button onclick="window.history.back()" class="label-md px-6 py-3 border border-outline-variant/20 text-on-background hover:bg-surface-container-low transition-colors rounded-DEFAULT">CANCEL</button>
            <button onclick="proceedToAssessment()" class="star-border rounded-DEFAULT shadow-[0_4px_14px_0_rgba(187,0,14,0.39)] transition-all transform hover:-translate-y-0.5" style="border:none;">
                <div class="star-border-inner bg-primary text-on-primary label-md px-8 py-3 rounded-DEFAULT flex items-center gap-2 hover:bg-primary-container">
                    PROCEED <span class="material-symbols-outlined text-sm">arrow_forward</span>
                </div>
            </button>
        </div>
    </div>
</main>

<footer class="bg-stone-100/90 backdrop-blur-md fixed bottom-0 left-0 right-0 z-50 w-full border-t border-stone-200">
    <div class="relative flex flex-col md:flex-row justify-between items-center px-8 py-6 max-w-[1920px] mx-auto">
        <span class="font-headline font-bold text-stone-950 text-sm tracking-widest">TEAM G-1107</span>
        <div class="flex flex-wrap justify-center gap-6">
            <a class="font-label text-[10px] uppercase tracking-widest text-stone-500 hover:text-primary transition-colors font-bold" href="#">MD-NEURO</a>
        </div>
        <span class="font-label text-[10px] uppercase tracking-widest text-stone-400 mt-6 md:mt-0 text-center md:text-right">© 2026 MANODHWANI — CLINICAL AI</span>
    </div>
</footer>

<script type="module">
    import { auth, db } from './js/firebase-config.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';
    import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';

    onAuthStateChanged(auth, async (user) => {
        const loginBtn = document.getElementById('login-signup-btn');
        const badgeWrap = document.getElementById('user-badge');
        const avatarNav = document.getElementById('user-avatar');
        const nameNavEl = document.getElementById('user-name');
        const resLink = document.getElementById('nav-results-link');

        if (!user) {
            if (loginBtn) loginBtn.style.display = '';
            if (badgeWrap) badgeWrap.classList.add('hidden');
            if (resLink) resLink.href = 'login.html';
            window.location.href = 'login.html';
            return;
        }

        if (loginBtn) loginBtn.style.display = 'none';
        if (badgeWrap) badgeWrap.classList.replace('hidden', 'flex');
        const displayName = user.displayName || user.email || 'User';
        const avatarUrl = user.photoURL || `https://ui-avatars.com/api/?background=bb000e&color=fff&name=${encodeURIComponent(displayName)}`;
        
        if (avatarNav) avatarNav.src = avatarUrl;
        if (nameNavEl) nameNavEl.textContent = displayName.split(' ')[0];
        if (resLink) resLink.href = 'results.html';

        const nameInput = document.getElementById('fullName');
        const ageInput = document.getElementById('age');
        const genderInput = document.getElementById('gender');
        const profileImg = document.getElementById('profile-img');

        // Profile image in form
        if (profileImg) profileImg.src = avatarUrl;

        // Auto-fill from Firestore
        try {
            const snap = await getDoc(doc(db, 'users', user.uid));
            if (snap.exists()) {
                const data = snap.data();
                if (data.fullName && !nameInput.value) nameInput.value = data.fullName;
                if (data.age && !ageInput.value) ageInput.value = data.age;
                if (data.gender && !genderInput.value) genderInput.value = data.gender;
            } else if (user.displayName) {
                nameInput.value = user.displayName;
            }
        } catch (e) {
            if (user.displayName) nameInput.value = user.displayName;
        }
    });

    window.proceedToAssessment = function() {
        const name = document.getElementById('fullName').value.trim();
        const age = document.getElementById('age').value.trim();
        const gender = document.getElementById('gender').value;

        if (!name) {
            alert('Please enter a full name.');
            return;
        }

        sessionStorage.setItem('md_userInfo', JSON.stringify({ name, age, gender }));
        window.location.href = 'analysis.html';
    };
</script>
</body>
</html>
