<body class="font-body min-h-screen flex flex-col antialiased bg-black pt-24 selection:bg-primary-container selection:text-on-primary-container">

<main class="flex-grow flex items-center justify-center p-6 relative overflow-hidden">

</div>
<!-- Glassmorphism Card -->
<div class="z-10 w-full max-w-2xl bg-[#0a0a0a]/70 backdrop-blur-2xl rounded-xl p-10 md:p-16 flex flex-col items-center text-center shadow-[0_24px_64px_-12px_rgba(187,0,14,0.1)] border border-outline-variant/10">

</div>
<h1 class="font-headline text-4xl md:text-5xl font-bold tracking-tight text-white mb-4">Analysis Failed</h1>
<p class="font-body text-lg text-surface-dim max-w-md mb-10 leading-relaxed">
  Could not connect to the backend server. Please ensure the server is running.
</p>
<!-- Terminal Block -->
<div class="w-full bg-black/50 rounded-lg p-6 mb-10 border-l-4 border-primary text-left overflow-x-auto font-label text-sm text-surface-dim">
<div class="flex items-center space-x-2 mb-3 opacity-50">
<span class="w-3 h-3 rounded-full bg-red-500"></span>
<span class="w-3 h-3 rounded-full bg-yellow-500"></span>

</div>

<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 0;">refresh</span>
Try Again
</button>

  Return to Home

  <footer class="bg-black fixed bottom-0 left-0 right-0 z-50 w-full border-t border-white/10 shadow-[0_-10px_30px_rgba(0,0,0,0.2)]">

    <div class="relative flex flex-col md:flex-row justify-between items-center px-8 py-6 max-w-[1920px] mx-auto">

<script>
  const msg = sessionStorage.getItem('ps_errorMessage');
  if (msg) {
    const el = document.getElementById('error-message');
    if (el) el.textContent = msg;
  }
</script>

<script type="module">
  import { auth } from './js/firebase-config.js';
  import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';

  onAuthStateChanged(auth, user => {
    const loginBtn = document.getElementById('login-signup-btn');
    const badgeWrap = document.getElementById('user-badge-index');
    const avatarNav = document.getElementById('user-avatar-index');
    const nameNavEl = document.getElementById('user-name-index');
    const resLink = document.getElementById('nav-results-link');

    if (user) {
      if (loginBtn) loginBtn.style.display = 'none';
      if (badgeWrap) badgeWrap.classList.replace('hidden', 'flex');
      const displayName = user.displayName || user.email || 'User';
      const avatarUrl = user.photoURL || `https://ui-avatars.com/api/?background=bb000e&color=fff&size=128&name=${encodeURIComponent(displayName)}`;
      
      if (avatarNav) avatarNav.src = avatarUrl;
      if (nameNavEl) nameNavEl.textContent = displayName.split(' ')[0];
      if (resLink) resLink.href = 'results.html';
    } else {
      if (loginBtn) loginBtn.style.display = '';
      if (badgeWrap) badgeWrap.classList.add('hidden');
      if (resLink) resLink.href = 'login.html';
    }
  });
</script>
